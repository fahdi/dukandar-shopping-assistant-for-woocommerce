<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  :root{
    --ink:#0c0d10; --paper:#f3efe6; --lime:#d6fb4f; --lime-deep:#aee02a; --rose:#ff6b5e;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:256px;height:256px;overflow:hidden;background:#000}
  .stage{position:relative;width:256px;height:256px;border-radius:56px;overflow:hidden;
    background:
      radial-gradient(120% 120% at 50% 42%, #16181c 0%, #0e0f12 52%, #08090b 100%);
  }
  .grain{position:absolute;inset:0;opacity:.05;mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='120' height='120' filter='url(%23n)'/></svg>");}
  .center{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:0;height:0}
  /* sonar rings emanate from center */
  .ring{position:absolute;left:0;top:0;border-radius:50%;border:3px solid var(--lime);
    transform:translate(-50%,-50%);will-change:transform,opacity}
  /* steady favicon ring */
  .ring-base{position:absolute;left:0;top:0;width:184px;height:184px;border-radius:50%;
    border:3px solid rgba(214,251,79,.26);transform:translate(-50%,-50%)}
  /* glow behind core */
  .glow{position:absolute;left:0;top:0;width:180px;height:180px;transform:translate(-50%,-50%);
    border-radius:50%;background:radial-gradient(circle, rgba(214,251,79,.42), rgba(214,251,79,.10) 42%, transparent 68%);
    filter:blur(2px)}
  /* the lime core disc */
  .core{position:absolute;left:0;top:0;width:120px;height:120px;transform:translate(-50%,-50%);
    border-radius:50%;background:radial-gradient(circle at 42% 38%, #eaff7a 0%, var(--lime) 46%, var(--lime-deep) 100%);
    box-shadow:0 6px 22px rgba(174,224,42,.35), inset 0 3px 8px rgba(255,255,255,.4), inset 0 -8px 16px rgba(120,150,10,.35)}
</style>
</head>
<body>
  <div class="stage">
    <div class="center" id="c">
      <div class="ring-base"></div>
      <div class="ring" id="r0"></div>
      <div class="ring" id="r1"></div>
      <div class="ring" id="r2"></div>
      <div class="glow" id="glow"></div>
      <div class="core" id="core"></div>
    </div>
    <div class="grain"></div>
  </div>
<script>
  const TAU=Math.PI*2;
  const rings=[document.getElementById('r0'),document.getElementById('r1'),document.getElementById('r2')];
  const core=document.getElementById('core'), glow=document.getElementById('glow');
  const MIN=118, MAX=250;               // ring diameter range (px)
  window.__draw=function(t){
    // breathing core + glow
    const b=0.5+0.5*Math.sin(t*TAU);
    core.style.transform=`translate(-50%,-50%) scale(${1+0.04*Math.sin(t*TAU)})`;
    glow.style.opacity=(0.55+0.4*b).toFixed(3);
    glow.style.transform=`translate(-50%,-50%) scale(${0.92+0.14*b})`;
    // sonar rings, staggered thirds
    rings.forEach((el,i)=>{
      const p=(t+i/3)%1;
      const d=MIN+(MAX-MIN)*p;
      // fade in fast, fade out toward the end
      const op=(p<0.12? p/0.12 : 1-((p-0.12)/0.88))*0.6;
      const bw=Math.max(1,3*(1-p*0.7));
      el.style.width=d+'px'; el.style.height=d+'px';
      el.style.opacity=Math.max(0,op).toFixed(3);
      el.style.borderWidth=bw.toFixed(2)+'px';
    });
  };
  window.__ready=true;
  let s=performance.now();
  (function loop(now){window.__draw(((now-s)/2800)%1);requestAnimationFrame(loop);})(performance.now());
</script>
</body>
</html>

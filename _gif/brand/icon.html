<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  :root{
    --loop: 2.6s;
    --plum-0:#3a1c63;   /* center glow */
    --plum-1:#22103f;   /* mid */
    --plum-2:#140a26;   /* edge */
    --v0:#a78bfa;       /* violet */
    --v1:#8b5cf6;
    --mag:#d946ef;      /* magenta */
    --pink:#f472b6;     /* warm accent */
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:256px;height:256px;overflow:hidden;background:#0c0616}
  .stage{position:relative;width:256px;height:256px;
    border-radius:58px;                 /* superellipse-ish squircle */
    background:radial-gradient(120% 120% at 50% 34%, var(--plum-0) 0%, var(--plum-1) 46%, var(--plum-2) 100%);
    overflow:hidden;
  }
  /* slow rotating conic sheen for life */
  .sheen{position:absolute;inset:-40%;
    background:conic-gradient(from 0deg, transparent 0deg, rgba(167,139,250,.16) 40deg, transparent 120deg, transparent 240deg, rgba(217,70,239,.12) 300deg, transparent 360deg);
    animation:spin var(--loop) linear infinite;
    filter:blur(6px);
  }
  /* fine grain */
  .grain{position:absolute;inset:0;opacity:.05;mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='120' height='120' filter='url(%23n)'/></svg>");
  }
  /* soft halo behind bubble */
  .halo{position:absolute;left:50%;top:50%;width:170px;height:170px;transform:translate(-50%,-50%);
    background:radial-gradient(circle, rgba(217,70,239,.42), rgba(139,92,246,.18) 45%, transparent 70%);
    animation:halo var(--loop) ease-in-out infinite;filter:blur(2px);
  }
  /* the chat bubble */
  .bubble{position:absolute;left:50%;top:47%;width:132px;height:120px;transform:translate(-50%,-50%);
    animation:breathe var(--loop) ease-in-out infinite;
  }
  .bubble .body{position:absolute;inset:0;border-radius:40px 40px 40px 12px;
    background:linear-gradient(145deg, var(--v0) 0%, var(--v1) 34%, var(--mag) 78%, var(--pink) 100%);
    box-shadow:0 10px 30px rgba(120,40,180,.45), inset 0 2px 6px rgba(255,255,255,.35), inset 0 -8px 18px rgba(90,20,140,.4);
  }
  /* bubble tail */
  .bubble .tail{position:absolute;left:14px;bottom:-12px;width:34px;height:34px;
    background:linear-gradient(145deg,var(--mag),var(--pink));border-radius:6px 0 20px 6px;transform:rotate(8deg);
    box-shadow:0 6px 14px rgba(120,40,180,.35);
  }
  /* primary sparkle */
  .spark{position:absolute;left:50%;top:48%;transform:translate(-50%,-50%);
    animation:twinkle calc(var(--loop)/2) ease-in-out infinite;
  }
  .spark svg{display:block;filter:drop-shadow(0 0 6px rgba(255,255,255,.9))}
  /* secondary small sparkle */
  .spark2{position:absolute;left:68%;top:33%;transform:translate(-50%,-50%);
    animation:twinkle2 var(--loop) ease-in-out infinite;
  }
  .spark2 svg{display:block;filter:drop-shadow(0 0 4px rgba(255,255,255,.9))}

  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes halo{0%,100%{opacity:.55;transform:translate(-50%,-50%) scale(.94)}50%{opacity:.9;transform:translate(-50%,-50%) scale(1.06)}}
  @keyframes breathe{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.035)}}
  @keyframes twinkle{
    0%,100%{transform:translate(-50%,-50%) scale(.82) rotate(-8deg);opacity:.85}
    50%{transform:translate(-50%,-50%) scale(1.12) rotate(6deg);opacity:1}
  }
  @keyframes twinkle2{
    0%,100%{transform:translate(-50%,-50%) scale(.4);opacity:.25}
    35%{transform:translate(-50%,-50%) scale(1);opacity:1}
    70%{transform:translate(-50%,-50%) scale(.5);opacity:.35}
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="sheen"></div>
    <div class="halo"></div>
    <div class="bubble"><div class="body"></div><div class="tail"></div></div>
    <div class="spark">
      <svg width="62" height="62" viewBox="0 0 100 100">
        <path d="M50 4 C54 32 68 46 96 50 C68 54 54 68 50 96 C46 68 32 54 4 50 C32 46 46 32 50 4 Z" fill="#ffffff"/>
      </svg>
    </div>
    <div class="spark2">
      <svg width="24" height="24" viewBox="0 0 100 100">
        <path d="M50 6 C53 34 66 47 94 50 C66 53 53 66 50 94 C47 66 34 53 6 50 C34 47 47 34 50 6 Z" fill="#ffffff"/>
      </svg>
    </div>
    <div class="grain"></div>
  </div>
</body>
</html>

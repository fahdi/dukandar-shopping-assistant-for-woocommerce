<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Hanken+Grotesk:wght@500;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1544px;height:500px;overflow:hidden;background:#0c0616}
  .stage{position:relative;width:1544px;height:500px;overflow:hidden;
    background:
      radial-gradient(80% 140% at 88% 32%, rgba(217,70,239,.28), transparent 55%),
      radial-gradient(60% 120% at 70% 80%, rgba(139,92,246,.22), transparent 60%),
      linear-gradient(100deg, #120920 0%, #1b1036 46%, #241247 78%, #2c1656 100%);
  }
  .sheenbg{position:absolute;inset:-30%;
    background:conic-gradient(from 0deg at 78% 40%, transparent 0deg, rgba(167,139,250,.10) 50deg, transparent 130deg, transparent 250deg, rgba(217,70,239,.08) 310deg, transparent 360deg);
    filter:blur(14px);}
  .grain{position:absolute;inset:0;opacity:.055;mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2'/></filter><rect width='140' height='140' filter='url(%23n)'/></svg>");}

  /* ---- glyph (chat bubble + sparkle) ---- */
  .glyph{position:absolute;left:104px;top:50%;width:212px;height:212px;transform:translateY(-50%)}
  .halo{position:absolute;left:50%;top:50%;width:250px;height:250px;transform:translate(-50%,-50%);
    background:radial-gradient(circle, rgba(217,70,239,.5), rgba(139,92,246,.2) 45%, transparent 70%);filter:blur(3px)}
  .bubble{position:absolute;left:50%;top:50%;width:180px;height:164px;transform:translate(-50%,-50%)}
  .bubble .body{position:absolute;inset:0;border-radius:54px 54px 54px 16px;
    background:linear-gradient(145deg,#a78bfa 0%,#8b5cf6 34%,#d946ef 78%,#f472b6 100%);
    box-shadow:0 16px 40px rgba(120,40,180,.5), inset 0 3px 8px rgba(255,255,255,.35), inset 0 -10px 24px rgba(90,20,140,.4)}
  .bubble .tail{position:absolute;left:20px;bottom:-16px;width:46px;height:46px;
    background:linear-gradient(145deg,#d946ef,#f472b6);border-radius:8px 0 26px 8px;transform:rotate(8deg);
    box-shadow:0 8px 18px rgba(120,40,180,.35)}
  .spark{position:absolute;left:50%;top:50%}
  .spark svg{display:block;filter:drop-shadow(0 0 8px rgba(255,255,255,.9))}
  .spark2{position:absolute;left:68%;top:32%}
  .spark2 svg{display:block;filter:drop-shadow(0 0 5px rgba(255,255,255,.9))}

  /* ---- wordmark ---- */
  .lock{position:absolute;left:372px;top:50%;transform:translateY(-50%)}
  .word{font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:132px;line-height:.92;letter-spacing:-1px;
    background:linear-gradient(100deg,#fff 0%,#fff 38%,#ffe6ff 48%,#fff 58%,#f3ebff 100%);
    background-size:280% 100%;-webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 3px 18px rgba(120,40,180,.35))}
  .word .ai{font-style:italic;background:linear-gradient(120deg,#d8b4fe,#f0abfc);-webkit-background-clip:text;background-clip:text;color:transparent}
  .rule{height:4px;width:0;margin:26px 0 20px;border-radius:3px;
    background:linear-gradient(90deg,#a78bfa,#f0abfc,#d946ef,#f472b6,#a78bfa);background-size:200% 100%;
    box-shadow:0 0 16px rgba(217,70,239,.6)}
  .sub{font-family:'Hanken Grotesk',system-ui,sans-serif;font-weight:600;font-size:30px;letter-spacing:6px;
    text-transform:uppercase;color:#c9b8e8}
  .woo{color:#f0abfc}

  /* ---- floating sparkles (right) ---- */
  .float{position:absolute;inset:0;pointer-events:none}
  .fs{position:absolute}
  .fs svg{display:block;filter:drop-shadow(0 0 6px rgba(255,255,255,.85))}
</style>
</head>
<body>
  <div class="stage">
    <div class="sheenbg" id="sheenbg"></div>

    <div class="float" id="float"></div>

    <div class="glyph">
      <div class="halo" id="halo"></div>
      <div class="bubble" id="bubble">
        <div class="body"></div><div class="tail"></div>
      </div>
      <div class="spark" id="spark"><svg width="86" height="86" viewBox="0 0 100 100"><path d="M50 4 C54 32 68 46 96 50 C68 54 54 68 50 96 C46 68 32 54 4 50 C32 46 46 32 50 4 Z" fill="#fff"/></svg></div>
      <div class="spark2" id="spark2"><svg width="30" height="30" viewBox="0 0 100 100"><path d="M50 6 C53 34 66 47 94 50 C66 53 53 66 50 94 C47 66 34 53 6 50 C34 47 47 34 50 6 Z" fill="#fff"/></svg></div>
    </div>

    <div class="lock">
      <div class="word">Fahad <span class="ai">AI</span></div>
      <div class="rule" id="rule"></div>
      <div class="sub">Shopping Assistant <span class="woo">·</span> for WooCommerce</div>
    </div>

    <div class="grain"></div>
  </div>

<script>
  // Build floating sparkles: each has base x,y (px), size, and phase (0..1)
  const floatEl = document.getElementById('float');
  const SP = [
    {x:1120,y:120,s:26,p:0.05},{x:1290,y:300,s:18,p:0.42},{x:1000,y:360,s:14,p:0.7},
    {x:1400,y:170,s:22,p:0.25},{x:1200,y:420,s:16,p:0.85},{x:1330,y:70,s:14,p:0.55},
    {x:980,y:180,s:12,p:0.33},{x:1450,y:360,s:18,p:0.62},{x:1080,y:250,s:10,p:0.9}
  ];
  const star = (s)=>`<svg width="${s}" height="${s}" viewBox="0 0 100 100"><path d="M50 6 C53 34 66 47 94 50 C66 53 53 66 50 94 C47 66 34 53 6 50 C34 47 47 34 50 6 Z" fill="#fff"/></svg>`;
  SP.forEach((o,i)=>{const d=document.createElement('div');d.className='fs';d.id='fs'+i;d.style.left=o.x+'px';d.style.top=o.y+'px';d.innerHTML=star(o.s);floatEl.appendChild(d);});

  const easeInOut = x => x<0.5 ? 2*x*x : 1-Math.pow(-2*x+2,2)/2;
  const TAU = Math.PI*2;

  // t normalized 0..1 (seamless)
  window.__draw = function(t){
    // background conic sheen
    document.getElementById('sheenbg').style.transform = `rotate(${t*360}deg)`;
    // glyph breathe
    const br = 1 + 0.028*Math.sin(t*TAU);
    document.getElementById('bubble').style.transform = `translate(-50%,-50%) scale(${br})`;
    // halo pulse
    const hp = 0.6 + 0.35*(0.5+0.5*Math.sin(t*TAU));
    document.getElementById('halo').style.opacity = hp;
    document.getElementById('halo').style.transform = `translate(-50%,-50%) scale(${0.94+0.12*(0.5+0.5*Math.sin(t*TAU))})`;
    // primary spark: twinkles twice per loop
    const tw = 0.5+0.5*Math.sin(t*TAU*2 - Math.PI/2);
    const sc = 0.82 + 0.34*tw, rot = -8 + 16*tw;
    const sp = document.getElementById('spark');
    sp.style.transform = `translate(-50%,-50%) scale(${sc}) rotate(${rot}deg)`;
    sp.style.opacity = 0.85 + 0.15*tw;
    // secondary spark: single pop, offset
    const p2 = (t+0.35)%1; const b2 = Math.max(0, Math.sin(p2*Math.PI));
    const s2 = document.getElementById('spark2');
    s2.style.transform = `translate(-50%,-50%) scale(${0.4+0.7*b2})`;
    s2.style.opacity = 0.25+0.75*b2;
    // wordmark sheen sweep (once per loop)
    document.querySelector('.word').style.backgroundPosition = `${100 - t*200}% 0`;
    // accent rule: steady width, glowing shimmer travels along it
    const rule = document.getElementById('rule');
    rule.style.width = '150px';
    rule.style.opacity = 0.7 + 0.3*(0.5+0.5*Math.sin(t*TAU));
    rule.style.backgroundPosition = `${t*200}% 0`;
    // floating sparkles: drift up + twinkle, per-phase
    SP.forEach((o,i)=>{
      const ph=(t+o.p)%1;
      const yoff = -34*ph;                 // rise
      const fade = Math.sin(ph*Math.PI);   // 0..1..0
      const tsc = 0.5+0.6*fade;
      const el=document.getElementById('fs'+i);
      el.style.transform = `translateY(${yoff}px) scale(${tsc})`;
      el.style.opacity = 0.15+0.75*fade;
    });
  };
  window.__ready = true;
  // idle preview
  let s=performance.now();
  function loop(now){ window.__draw(((now-s)/4000)%1); requestAnimationFrame(loop);}
  requestAnimationFrame(loop);
</script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Hanken+Grotesk:wght@500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0c0d10;--ink-2:#111318;--ink-3:#1a1d24;
    --paper:#f3efe6;--paper-soft:#c7c3b8;--paper-dim:#8a877e;
    --lime:#d6fb4f;--lime-deep:#aee02a;--rose:#ff6b5e;
    --line:rgba(255,255,255,.09);
    --shadow:0 40px 90px -34px rgba(0,0,0,.78);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:720px;height:600px;overflow:hidden;
    font-family:'Hanken Grotesk',system-ui,sans-serif;
    background:
      radial-gradient(80% 120% at 20% 20%, #16181d 0%, #0f1013 48%, #0a0b0d 100%),
      radial-gradient(60% 120% at 92% 96%, rgba(214,251,79,.09), transparent 60%),
      var(--ink);
  }
  .stage{position:relative;width:720px;height:600px;overflow:hidden;display:flex;align-items:center;justify-content:center}

  .grain{position:absolute;inset:0;opacity:.045;mix-blend-mode:overlay;pointer-events:none;z-index:5;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2'/></filter><rect width='140' height='140' filter='url(%23n)'/></svg>");}

  /* caption / brand line above the chat */
  .frame{width:560px}
  .eyebrow{font-family:'JetBrains Mono',ui-monospace,monospace;font-size:12px;letter-spacing:.16em;
    text-transform:uppercase;color:var(--lime-deep);display:flex;align-items:center;gap:10px;margin:0 4px 16px}
  .eyebrow .disc{width:11px;height:11px;border-radius:50%;background:var(--lime);
    box-shadow:0 0 0 4px rgba(214,251,79,.16)}
  .eyebrow b{color:var(--paper-soft);font-weight:500}

  /* chat mock (matches marketing hero) */
  .mock{background:linear-gradient(180deg,var(--ink-2),#101218);border:1px solid var(--line);
    border-radius:20px;box-shadow:var(--shadow);overflow:hidden}
  .mock-top{display:flex;align-items:center;gap:9px;padding:14px 16px;border-bottom:1px solid var(--line);
    background:rgba(255,255,255,.015)}
  .mock-top .dot{width:8px;height:8px;border-radius:50%;background:var(--lime)}
  .mock-top .name{font-weight:600;font-size:14px;color:var(--paper)}
  .mock-top .live{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.1em;
    color:var(--paper-dim);text-transform:uppercase}
  .mock-body{padding:18px 16px;display:flex;flex-direction:column;gap:12px;min-height:300px}

  .bub{max-width:86%;padding:11px 14px;border-radius:14px;font-size:14.5px;line-height:1.5;color:var(--paper)}
  .bub.user{align-self:flex-end;background:var(--ink-3);border-bottom-right-radius:5px}
  .bub.bot{align-self:flex-start;background:#0c1408;border:1px solid rgba(214,251,79,.22);border-bottom-left-radius:5px}

  .typing{align-self:flex-start;display:flex;gap:5px;align-items:center;padding:13px 15px;border-radius:14px;
    border-bottom-left-radius:5px;background:#0c1408;border:1px solid rgba(214,251,79,.22)}
  .typing i{width:6px;height:6px;border-radius:50%;background:var(--lime-deep)}

  .card{display:flex;gap:11px;align-items:center;background:rgba(255,255,255,.025);border:1px solid var(--line);
    border-radius:12px;padding:10px;margin-top:8px}
  .card .ph{width:46px;height:46px;border-radius:8px;background:linear-gradient(135deg,#23262e,#171a20);
    flex-shrink:0;display:flex;align-items:center;justify-content:center}
  .card .ph svg{width:28px;height:28px;display:block}
  .card .t{font-weight:600;font-size:13.5px;color:var(--paper)}
  .card .pr{font-family:'JetBrains Mono',monospace;font-size:12.5px;color:var(--lime);margin-top:3px}
  .src{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--lime-deep);margin-top:8px;
    display:inline-flex;gap:7px;align-items:center}
  .src::before{content:"\2713";font-weight:700}

  /* elements are shown/hidden + animated by JS */
  .row{display:none}
  .row.on{display:block}
  .bub .caret{display:none;width:2px;height:1.05em;margin-left:1px;vertical-align:-0.16em;
    background:var(--paper)}
  .bub.typing-now .caret{display:inline-block}
  .anim{opacity:0;transform:translateY(10px)}
</style>
</head>
<body>
  <div class="stage">
    <div class="frame">
      <div class="eyebrow"><span class="disc"></span>Fahad AI <b>·</b> grounded in your store data</div>
      <div class="mock">
        <div class="mock-top">
          <span class="dot"></span><span class="name">Store Assistant</span><span class="live">grounded</span>
        </div>
        <div class="mock-body">
          <div class="row bub user" id="r0"><span class="txt"></span><span class="caret"></span></div>
          <div class="row typing" id="r1"><i></i><i></i><i></i></div>
          <div class="row bub bot" id="r2">
            <span class="reply">Yes, the AeroBeat Wireless Headphones are in stock right now.</span>
            <div class="card">
              <div class="ph">
                <svg viewBox="0 0 48 48" fill="none" aria-hidden="true">
                  <path d="M10 27v-2c0-7.7 6.3-14 14-14s14 6.3 14 14v2" stroke="var(--paper-soft)" stroke-width="2.4" stroke-linecap="round"/>
                  <rect x="7" y="26" width="7" height="12" rx="3.2" fill="var(--paper-soft)"/>
                  <rect x="34" y="26" width="7" height="12" rx="3.2" fill="var(--lime)"/>
                </svg>
              </div>
              <div>
                <div class="t">AeroBeat Wireless Headphones</div>
                <div class="pr">$89.00 &middot; In stock</div>
              </div>
            </div>
            <div class="src">read live from your catalogue</div>
          </div>
        </div>
      </div>
    </div>
    <div class="grain"></div>
  </div>

<script>
  var USER_TEXT = "What wireless headphones do you have, and how much?";
  var r0 = document.getElementById('r0');
  var r1 = document.getElementById('r1');
  var r2 = document.getElementById('r2');
  var userTxt = r0.querySelector('.txt');
  var typingDots = [].slice.call(r1.querySelectorAll('i'));

  var easeOut = function(x){ return 1 - Math.pow(1 - x, 3); };

  // ---- timeline (milliseconds) ----
  var CH = 42;                                  // ms per typed character
  var typeDur = USER_TEXT.length * CH;          // ~1932ms
  var T = {
    userStart:  350,
    userTyped:  350 + typeDur,                  // finished typing
    dotsStart:  350 + typeDur + 320,
    replyStart: 350 + typeDur + 320 + 1150,     // hide dots, show reply + card
  };
  var HOLD = 2900;                              // hold finished state
  var TAIL = 650;                               // fade-out breath before loop
  var CYCLE = T.replyStart + HOLD + TAIL;

  function show(el){ el.classList.add('on'); }
  function hide(el){ el.classList.remove('on'); }

  // spring-ish entrance for a bubble given its local progress 0..1
  function entrance(el, p){
    var e = easeOut(Math.min(1, p));
    el.style.opacity = e.toFixed(3);
    el.style.transform = 'translateY(' + (10 * (1 - e)).toFixed(2) + 'px)';
  }

  window.__draw = function(t){
    var ms = t * CYCLE;

    // reset visibility each frame (idempotent draw)
    hide(r0); hide(r1); hide(r2);
    r0.classList.remove('typing-now');

    // global gentle fade at the very end so the loop restart is soft
    var fade = 1;
    var fadeStart = CYCLE - TAIL;
    if (ms > fadeStart) fade = 1 - easeOut((ms - fadeStart) / TAIL);
    document.querySelector('.mock').style.opacity = (0.35 + 0.65 * fade).toFixed(3);
    document.querySelector('.eyebrow').style.opacity = fade.toFixed(3);

    // 1) shopper types turn 1
    if (ms >= T.userStart){
      show(r0);
      var typeP = (ms - T.userStart) / typeDur;         // 0..1 across typing
      var isTyping = typeP < 1;
      var k = Math.max(0, Math.min(USER_TEXT.length, Math.round(typeP * USER_TEXT.length)));
      userTxt.textContent = USER_TEXT.slice(0, k);
      if (isTyping) r0.classList.add('typing-now');
      // subtle entrance in first 240ms
      entrance(r0, (ms - T.userStart) / 240);
    }

    // 2) typing indicator (three dots), only between dotsStart and replyStart
    if (ms >= T.dotsStart && ms < T.replyStart){
      show(r1);
      entrance(r1, (ms - T.dotsStart) / 240);
      // animate the three dots (bounce)
      var dt = (ms - T.dotsStart) / 1100;
      typingDots.forEach(function(dot, i){
        var ph = (dt - i * 0.16);
        var frac = ph - Math.floor(ph);
        // pulse: up around frac~0.35
        var up = Math.max(0, Math.sin(frac * Math.PI));
        dot.style.opacity = (0.35 + 0.65 * up).toFixed(3);
        dot.style.transform = 'translateY(' + (-3 * up).toFixed(2) + 'px)';
      });
    }

    // 3) grounded reply + product card, then hold
    if (ms >= T.replyStart){
      show(r0);
      userTxt.textContent = USER_TEXT;                  // keep full user message
      show(r2);
      entrance(r2, (ms - T.replyStart) / 360);
    }
  };

  window.__ready = true;

  // Live preview loop for viewing demo.html in a browser. The frame renderer calls
  // __draw(t) directly; the first such external call cancels this loop so it does not
  // fight the deterministic per-frame draws.
  var _rafId = null, _internal = false;
  var _draw = window.__draw;
  window.__draw = function(t){
    if (!_internal && _rafId !== null){ cancelAnimationFrame(_rafId); _rafId = null; }
    return _draw(t);
  };
  var s = performance.now();
  (function loop(now){
    _internal = true; window.__draw(((now - s) / CYCLE) % 1); _internal = false;
    _rafId = requestAnimationFrame(loop);
  })(performance.now());
</script>
</body>
</html>
